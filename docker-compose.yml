
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-adiwarna}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - adiwarna-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./adiwarnafest-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__AdiwarnaDatabase: Host=postgres;Port=5432;Database=${POSTGRES_DB:-adiwarna};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres};SSL Mode=Disable
      AppSettings__Token: ${JWT_SECRET:-your-very-long-secret-key-change-this-in-production-must-be-at-least-64-chars-for-HS512-algorithm!!}
      AppSettings__Issuer: ${JWT_ISSUER:-http://localhost}
      AppSettings__Audience: ${JWT_AUDIENCE:-http://localhost}
      ASPNETCORE_ENVIRONMENT: Production
    ports:
      - "8080:5190"
    networks:
      - adiwarna-network

  frontend:
    build: ./adiwarnafest-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    networks:
      - adiwarna-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - adiwarna-network

volumes:
  postgres_data:

networks:
  adiwarna-network:
    driver: bridge
