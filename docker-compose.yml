
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-adiwarna}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql
    networks:
      - adiwarna-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  backend:
    build: ./adiwarnafest-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__AdiwarnaDatabase: Host=postgres;Port=5432;Database=${POSTGRES_DB:-adiwarna};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres};SSL Mode=Disable
      AppSettings__Token: ${JWT_SECRET}
      AppSettings__Issuer: ${JWT_ISSUER:-http://localhost}
      AppSettings__Audience: ${JWT_AUDIENCE:-http://localhost}
      LuckyDraw__GoogleSheetsUrl: ${LUCKY_DRAW_SHEETS_URL:-https://script.google.com/macros/s/AKfycbzPCsBCWRBkQ4O0mAtXHkUtcGII0PM1SSwjJH_ENN3H9JaF6jYhCqEeAF1C1gaAbqY/exec}
      LiveStats__GoogleSheetsUrl: ${LIVE_STATS_SHEETS_URL:-https://script.google.com/macros/s/AKfycbxwUHG4PUY5If7wCQwVlkiQ-WNaUvWRwDg3e5bXHBWnlvxyjnjX2UiaCuVzAx5g96ZQ2g/exec}
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://0.0.0.0:5190
    networks:
      - adiwarna-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5190/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  frontend:
    build: ./adiwarnafest-frontend
    depends_on:
      - backend
    networks:
      - adiwarna-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    networks:
      - adiwarna-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

volumes:
  postgres_data:

networks:
  adiwarna-network:
    driver: bridge
